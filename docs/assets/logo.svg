<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="AquaScope logo">
  <title>AquaScope</title>
  <defs>
    <linearGradient id="dropGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e3a52"/>
    </linearGradient>
    <linearGradient id="hydroGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0fbff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.95"/>
    </linearGradient>
    <clipPath id="dropClip">
      <path d="M120 22 C 120 22, 60 92, 60 142 a60 60 0 0 0 120 0 C 180 92, 120 22, 120 22 Z"/>
    </clipPath>
  </defs>

  <!-- Outer drop with gradient fill -->
  <path d="M120 22 C 120 22, 60 92, 60 142 a60 60 0 0 0 120 0 C 180 92, 120 22, 120 22 Z"
        fill="url(#dropGrad)"/>

  <!-- Inner hydrograph / contour stack, clipped to drop -->
  <g clip-path="url(#dropClip)" stroke="url(#hydroGrad)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M55 178 Q 80 168, 100 174 T 140 162 T 185 152"/>
    <path d="M55 162 Q 80 150, 100 158 T 140 144 T 185 132" opacity="0.85"/>
    <path d="M55 146 Q 80 134, 100 142 T 140 126 T 185 114" opacity="0.7"/>
    <path d="M55 130 Q 80 120, 100 128 T 140 110 T 185 96"  opacity="0.55"/>
    <path d="M55 114 Q 80 106, 100 112 T 140 94  T 185 80"  opacity="0.4"/>
  </g>

  <!-- Specular highlight -->
  <path d="M96 60 Q 82 88, 86 116" stroke="#ffffff" stroke-opacity="0.55" stroke-width="6"
        stroke-linecap="round" fill="none"/>

  <!-- Subtle ring around the drop -->
  <path d="M120 22 C 120 22, 60 92, 60 142 a60 60 0 0 0 120 0 C 180 92, 120 22, 120 22 Z"
        fill="none" stroke="#0e3a52" stroke-opacity="0.25" stroke-width="2"/>
</svg>
