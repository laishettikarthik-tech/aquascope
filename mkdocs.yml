site_name: AquaScope
site_url: https://rekin226.github.io/aquascope/
site_description: Hydrology toolkit for Python — flood frequency, baseflow, FAO-56 crop water, AI methodology recommender, 15 data sources
site_author: Rekin226
repo_url: https://github.com/Rekin226/aquascope
repo_name: Rekin226/aquascope
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Rekin226 — released under the project license

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - social  # OG image cards for Reddit/HN previews; requires libcairo (brew install cairo).
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            docstring_section_style: table
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            members_order: source
            separate_signature: true
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Rekin226/aquascope
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/aquascope/
      name: PyPI
    - icon: fontawesome/solid/mug-hot
      link: https://ko-fi.com/getaquascope
      name: Ko-fi
  generator: false  # hides "Made with Material for MkDocs" footer; keep true if you want to credit

# Nav: every reused .md mapped here; the four NEW pages
# (index.md, getting_started.md, examples/potomac_flood_frequency.md, api.md)
# need to be written before `mkdocs build --strict` will pass.
nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - User Guide:
    - Features: features.md
    - Methodology matrix: methodology_matrix.md
    - Theory: theory.md
    - Data sources: data_sources.md
    - Use cases: use_cases.md
  - Examples:
    - Potomac flood frequency: examples/potomac_flood_frequency.md
  - Guides:
    - Architecture: guides/architecture.md
    - Running pipelines: guides/running_pipelines.md
    - Adding a data source: guides/adding_data_source.md
    - Adding a methodology: guides/adding_methodology.md
    - FAO agriculture plan: guides/fao_agriculture_plan.md
    - Uncertainty quantification: guides/uncertainty.md
  - Integration:
    - QGIS: integration_guides/qgis_integration.md
    - R: integration_guides/r_integration.md
    - xarray and GeoPandas: integration_guides/xarray_integration.md
  - API Reference: api.md
  - FAQ: faq.md
  - Troubleshooting: troubleshooting.md
